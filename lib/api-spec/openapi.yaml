      operationId: updateBusinessProfile
      tags: [settings]
      summary: Update business profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BusinessProfileInput" }
      responses:
        "200":
          description: Updated business profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessProfile" }

  # ── Customer Settings ─────────────────────────────────────────────────────
  /customer-settings:
    get:
      operationId: getCustomerSettings
      tags: [settings]
      summary: Get customer settings for current merchant
      responses:
        "200":
          description: Customer settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerSettings" }
    put:
      operationId: updateCustomerSettings
      tags: [settings]
      summary: Update customer settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerSettingsInput" }
      responses:
        "200":
          description: Updated customer settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerSettings" }

  # ── Sticker Templates ─────────────────────────────────────────────────────
  /sticker-templates:
    get:
      operationId: listStickerTemplates
      tags: [settings]
      summary: List sticker templates for current merchant
      responses:
        "200":
          description: List of sticker templates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StickerTemplate" }
    post:
      operationId: createStickerTemplate
      tags: [settings]
      summary: Create a sticker template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StickerTemplateInput" }
      responses:
        "201":
          description: Created sticker template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StickerTemplate" }

  /sticker-templates/{id}:
    put:
      operationId: updateStickerTemplate
      tags: [settings]
      summary: Update a sticker template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StickerTemplateUpdateInput" }
      responses:
        "200":
          description: Updated sticker template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StickerTemplate" }
    delete:
      operationId: deleteStickerTemplate
      tags: [settings]
      summary: Delete a sticker template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /integrations/oauth/apple/start:
    get:
      operationId: startAppleOAuth
      summary: Initiate Apple Sign In OAuth flow
      tags: [Integrations]
      security:
        - sessionAuth: []
      responses:
        "302":
          description: Redirect to Apple authorization endpoint (response_mode=form_post, scope=name email)

  /integrations/oauth/apple/callback:
    post:
      operationId: appleOAuthCallback
      summary: Apple Sign In OAuth callback (form_post)
      description: >
        Receives the Apple form_post callback. Decodes the id_token JWT to extract the user's
        Apple ID (sub) and email, exchanges the authorization code for access and refresh tokens
        using a signed ES256 client-secret JWT, and persists the tokens to the encrypted vault.
      tags: [Integrations]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/AppleOAuthCallbackBody"
      responses:
        "302":
          description: Redirect to /management/integrations with success or error query param

  /sticker-templates/{id}/set-default:
    post:
      operationId: setDefaultStickerTemplate
      tags: [settings]
      summary: Toggle default flag on a sticker template (atomic, unsets other defaults in same type)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated templates list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StickerTemplate" }

