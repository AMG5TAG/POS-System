    # ── Loyalty ───────────────────────────────────────────────────────────────
    LoyaltyTier:
      type: object
      required: [name]
      properties:
        name:
          type: string
        minSpend:
          type: number
          description: Minimum lifetime spend (dollars) to reach this tier. Either minSpend or pointsRequired should be set.
        pointsRequired:
          type: number
          description: Minimum loyalty points required to reach this tier. Alternative to minSpend for points-based thresholds.
        rate:
          type: number
          description: Cashback rate or earn multiplier for this tier.
        discountPct:
          type: number
          description: Automatic discount percentage applied at checkout for this tier.
        freeShipping:
          type: boolean
          description: Whether customers in this tier get free shipping.
        bonusMultiplier:
          type: number
          description: Loyalty earn multiplier for this tier (e.g. 1.5x points).
        description:
          type: string
          description: Customer-facing description of tier benefits.

    LoyaltyPromotion:
      type: object
      required: [id, name, type, active]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [double_points, category_bonus, product_bonus, spend_threshold, birthday]
        active:
          type: boolean
        multiplier:
          type: number
        bonusAmount:
          type: number
        categoryId:
          type: [integer, "null"]
        productId:
          type: [integer, "null"]
        minSpend:
          type: [number, "null"]
        startDate:
          type: [string, "null"]
        endDate:
          type: [string, "null"]

