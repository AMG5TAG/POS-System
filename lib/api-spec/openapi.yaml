        staffId:
          type: ["integer", "null"]
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, completed, cancelled, no-show]
        notes:
          type: ["string", "null"]

