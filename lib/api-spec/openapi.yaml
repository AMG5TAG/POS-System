components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Auth ────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [email, password, businessName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        businessName:
          type: string
          minLength: 1
        ownerName:
          type: string
        phone:
          type: string
        planId:
          type: integer

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    # ── Merchant ────────────────────────────────────────────────────────────
    Merchant:
      type: object
      required: [id, email, businessName, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        businessName:
          type: string
        ownerName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        currency:
          type: string
        timezone:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    MerchantUpdate:
      type: object
      properties:
        businessName:
          type: string
        ownerName:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        currency:
          type: string
        timezone:
          type: string
        logoUrl:
          type: string
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-z0-9][a-z0-9-]{1,28}[a-z0-9]$"

    # ── Plans ────────────────────────────────────────────────────────────────
    Plan:
      type: object
      required: [id, name, slug, priceMonthly, priceYearly, maxRegisters, maxStaff, features]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        priceMonthly:
          type: number
        priceYearly:
          type: number
        maxRegisters:
          type: ["integer", "null"]
        maxStaff:
          type: ["integer", "null"]
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
        sortOrder:
          type: integer

    Module:
      type: object
      required: [id, name, slug, description, priceMonthly, category, icon]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        priceMonthly:
          type: number
        category:
          type: string
        icon:
          type: string
        isEnabled:
          type: boolean

    Subscription:
      type: object
      required: [id, merchantId, planId, status, currentPeriodStart, currentPeriodEnd]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        planId:
          type: integer
        plan:
          $ref: "#/components/schemas/Plan"
        status:
          type: string
          enum: [active, trialing, past_due, cancelled]
        currentPeriodStart:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
        cancelAtPeriodEnd:
          type: boolean

    # ── Products ─────────────────────────────────────────────────────────────
    ProductPriceHistoryEntry:
      type: object
      required: [id, productId, costPrice, changedAt]
      properties:
        id: { type: integer }
        productId: { type: integer }
        costPrice: { type: number }
        supplierName: { type: string, nullable: true }
        poNumber: { type: string, nullable: true }
        poId: { type: integer, nullable: true }
        changedAt: { type: string }
    Product:
      type: object
      required: [id, merchantId, name, price, sku, trackInventory, productType, createdAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        costPrice:
          type: ["number", "null"]
        sku:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        category:
          $ref: "#/components/schemas/Category"
        brandId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        trackInventory:
          type: boolean
        stockQuantity:
          type: ["integer", "null"]
        lowStockThreshold:
          type: ["integer", "null"]
        taxRate:
          type: ["number", "null"]
        isActive:
          type: boolean
        excludeFromLoyalty:
          type: boolean
        productType:
          type: string
        groupPrices:
          type: object
          additionalProperties:
            type: number
        supplier:
          type: ["string", "null"]
        supplierCode:
          type: ["string", "null"]
        isEpay:
          type: boolean
        tags:
          type: array
          items:
            type: string
          maxItems: 5
        stockLocation:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        costPrice:
          type: number
        sku:
          type: string
        barcode:
          type: string
        categoryId:
          type: integer
        brandId:
          type: integer
        imageUrl:
          type: string
        trackInventory:
