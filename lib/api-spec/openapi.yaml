      properties:
        id:
          type: integer
        merchantId:
          type: integer
        customerId:
          type: ["integer", "null"]
        staffId:
          type: ["integer", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        scheduledAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        status:
          type: string
          enum: [scheduled, completed, cancelled, no-show]
        notes:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        staffName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AppointmentInput:
      type: object
