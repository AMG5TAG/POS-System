    # ── Loyalty ───────────────────────────────────────────────────────────────
    LoyaltyTier:
      type: object
      required: [name]
      properties:
        name:
          type: string
        minSpend:
          type: number
          description: Minimum lifetime spend (dollars) to reach this tier. Either minSpend or pointsRequired should be set.
        pointsRequired:
          type: number
          description: Minimum loyalty points required to reach this tier. Alternative to minSpend for points-based thresholds.
        rate:
          type: number
          description: Cashback rate or earn multiplier for this tier.
        discountPct:
          type: number
          description: Automatic discount percentage applied at checkout for this tier.
        freeShipping:
          type: boolean
          description: Whether customers in this tier get free shipping.
        bonusMultiplier:
          type: number
          description: Loyalty earn multiplier for this tier (e.g. 1.5x points).
        description:
          type: string
          description: Customer-facing description of tier benefits.

    LoyaltyPromotion:
      type: object
      required: [id, name, type, active]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [double_points, category_bonus, product_bonus, spend_threshold, birthday]
        active:
          type: boolean
        multiplier:
          type: number
        bonusAmount:
          type: number
        categoryId:
          type: [integer, "null"]
        productId:
          type: [integer, "null"]
        minSpend:
          type: [number, "null"]
        startDate:
          type: [string, "null"]
        endDate:
          type: [string, "null"]

    LoyaltySettings:
      type: object
      required: [programType, isEnabled]
      properties:
        programType:
          type: string
          enum: [cashback, points, tiered, stamp, custom]
        isEnabled:
          type: boolean
        cashbackRate:
          type: number
        pointsPerDollar:
          type: number
        dollarPerPoint:
          type: number
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/LoyaltyTier"
        stampsRequired:
          type: integer
        stampRewardValue:
          type: number
        customDescription:
          type: string
        customValue:
          type: number
        excludedCustomerGroups:
          type: array
          items:
            type: string
        expiryMode:
          type: string
          enum: [none, daysSinceLastPurchase, fixedDays, endOfYear, fixedDate]
          description: How loyalty points expire.
        expiryValue:
          type: [integer, "null"]
          description: Numeric value for the expiry mode (e.g. days count). Null when mode is 'none' or 'endOfYear'.
        promotions:
          type: array
          items:
            $ref: "#/components/schemas/LoyaltyPromotion"
          description: Active loyalty promotions (Double Points, Category Bonuses, etc.).
        naming:
          $ref: "#/components/schemas/LoyaltyNaming"
          description: Custom names for the program and its reward units. Synced across all staff devices.

    LoyaltyNaming:
      type: object
      properties:
        programName:  { type: string, description: "Shown on receipts and customer screens. Blank uses the default program type label." }
        cashbackUnit: { type: string }
        pointsUnit:   { type: string }
        stampUnit:    { type: string }
        tieredUnit:   { type: string }
        customUnit:   { type: string }

    LoyaltySettingsInput:
      type: object
