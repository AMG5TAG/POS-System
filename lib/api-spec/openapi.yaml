openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KoaPOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session management
  - name: merchants
    description: Merchant account management
  - name: plans
    description: Subscription plans and modules
  - name: subscriptions
    description: Merchant subscriptions
  - name: products
    description: Product catalog management
  - name: categories
    description: Product categories
  - name: customers
    description: Customer management
  - name: transactions
    description: Sales transactions and orders
  - name: staff
    description: Staff and employee management
  - name: inventory
    description: Inventory tracking
  - name: dashboard
    description: Dashboard summary and analytics
  - name: loyalty
    description: Loyalty program settings
  - name: service-jobs
    description: Service job management
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: cameras
    description: IP camera management and snapshots
  - name: openai
    description: AI assistant powered by OpenAI
  - name: ai
    description: AI feature settings and kill-switch
  - name: brands
    description: Brand management
  - name: tags
    description: Tag management
  - name: suppliers
    description: Supplier management
  - name: product-recalls
    description: Product recall management
  - name: product-pre-orders
    description: Pre-order management
  - name: product-return-auths
    description: Return authorisation management
  - name: pos-register-sessions
    description: POS register session tracking
  - name: pos-favourites
    description: POS favourite products per register
  - name: pos-staff-sessions
    description: POS staff login sessions
  - name: pos-templates
    description: POS receipt and template management
  - name: pos-receipt-settings
    description: POS receipt configuration
  - name: pos-code-prefixes
    description: POS code prefix settings
  - name: inventory-settings
    description: Inventory display settings
  - name: regional-ext-settings
    description: Regional extended settings
  - name: staff-rostering-settings
    description: Staff rostering configuration
  - name: staff-links
    description: Staff shared links
  - name: service-job-templates
    description: Service job templates
  - name: marketing-generators
    description: Marketing content generators
  - name: sales-templates
    description: Print template configuration engine
  - name: POS
    description: Point of sale registers and settings
  - name: Settings
    description: Merchant-level feature settings
  - name: KPIs
    description: KPI targets and performance settings
  - name: Marketing
    description: QR codes, email templates, campaigns, landing pages, and shortlinks
  - name: OnlineStore
    description: Online store, shipping carriers, marketplace connections, and delivery orders

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated merchant
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new merchant account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  # ── Merchants ─────────────────────────────────────────────────────────────
  /merchants/me:
    get:
      operationId: getMerchant
      tags: [merchants]
      summary: Get merchant profile
      responses:
        "200":
          description: Merchant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
    patch:
      operationId: updateMerchant
      tags: [merchants]
      summary: Update merchant profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  # ── Plans ─────────────────────────────────────────────────────────────────
  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List all subscription plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /plans/{id}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a single plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /modules:
    get:
      operationId: listModules
      tags: [plans]
      summary: List all available add-on modules
      responses:
        "200":
          description: List of modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

  # ── Subscriptions ─────────────────────────────────────────────────────────
  /subscriptions/me:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get current merchant subscription
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/me/modules:
    get:
      operationId: getMyModules
      tags: [subscriptions]
      summary: Get enabled modules for current merchant
      responses:
        "200":
          description: Enabled modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

  /subscriptions/me/modules/{moduleId}:
    post:
      operationId: enableModule
      tags: [subscriptions]
      summary: Enable a module for current merchant
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
    delete:
      operationId: disableModule
      tags: [subscriptions]
      summary: Disable a module for current merchant
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Module disabled

  # ── Products ──────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Product Types ──────────────────────────────────────────────────────────
  /product-types:
    get:
      operationId: listProductTypes
      tags: [products]
      summary: List product types
      responses:
        "200":
          description: Product type list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductTypeList"
    post:
      operationId: createProductType
      tags: [products]
      summary: Create product type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductType"

  /product-types/reorder:
    post:
      operationId: reorderProductTypes
      tags: [products]
      summary: Reorder product types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTypeReorderInput"
      responses:
        "204":
          description: Reordered

  /product-types/{id}:
    patch:
      operationId: updateProductType
      tags: [products]
      summary: Update product type
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTypeInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductType"
    delete:
      operationId: deleteProductType
      tags: [products]
      summary: Delete product type
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Categories ────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/pricing-history:
    get:
      operationId: getProductPricingHistory
      summary: Get pricing history for a product
      tags: [products]
      security: [{ session: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Pricing history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductPriceHistoryEntry"

  # ── Digital Codes ─────────────────────────────────────────────────────────
  /products/{productId}/digital-codes:
    get:
      operationId: listDigitalCodes
      tags: [products]
      summary: List digital codes for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of digital codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DigitalCode"
    post:
      operationId: createDigitalCode
      tags: [products]
      summary: Add a digital code to a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DigitalCodeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalCode"

  /digital-codes/{id}:
    delete:
      operationId: deleteDigitalCode
      tags: [products]
      summary: Delete a digital code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Customers ─────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/generate-referral-codes:
    post:
      operationId: generateMissingReferralCodes
      tags: [customers]
      summary: Generate referral codes for all customers missing one
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer
                    description: Number of customers updated

  # ── Customer sub-resources ────────────────────────────────────────────────

  /customers/{id}/generate-referral-code:
    post:
      operationId: generateCustomerReferralCode
      tags: [customers]
      summary: Generate a referral code for a specific customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}/history:
    get:
      operationId: getCustomerHistory
      tags: [customers]
      summary: Get all history for a customer (sales, appointments, services)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerHistory"

  /customers/{id}/notes:
    get:
      operationId: listCustomerNotes
      tags: [customers]
      summary: List notes for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerNote"
    post:
      operationId: createCustomerNote
      tags: [customers]
      summary: Add a note to a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerNoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerNote"

  /customers/{id}/notes/{noteId}:
    delete:
      operationId: deleteCustomerNote
      tags: [customers]
      summary: Delete a customer note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/{id}/files:
    get:
      operationId: listCustomerFiles
      tags: [customers]
      summary: List files attached to a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerFile"
    post:
      operationId: createCustomerFile
      tags: [customers]
      summary: Register an uploaded file against a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerFileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerFile"

  /customers/{id}/files/{fileId}:
    delete:
      operationId: deleteCustomerFile
      tags: [customers]
      summary: Delete a customer file record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/{primaryId}/merge/{secondaryId}:
    post:
      operationId: mergeCustomerProfiles
      tags: [customers]
      summary: Merge two customer profiles into one atomic DB transaction
      description: >
        Transfers all historical data (sales, invoices, service jobs, appointments,
        laybys, parked sales, notes, files, form submissions, marketing automations)
        from the secondary profile to the primary, aggregates loyalty balances,
        appends a merge audit note, then permanently deletes the secondary record.
      parameters:
        - name: primaryId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the profile to keep (master record)
        - name: secondaryId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the profile to absorb and delete
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason or note for the merge, recorded in the audit trail
      responses:
        "200":
          description: Merge succeeded — returns the updated primary customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Cannot merge a profile with itself
        "404":
          description: One or both customer profiles not found

  /customers/bulk-merge-preview:
    post:
      operationId: bulkMergePreview
      tags: [customers]
      summary: Scan all customers and return grouped duplicate buckets
      description: >
        Finds duplicates by exact phone number or identical first+last name,
        groups matches into buckets with transaction aggregates, and returns
        a suggested primary record per bucket.
      responses:
        "200":
          description: Duplicate buckets with aggregate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMergePreviewResponse"

  /customers/bulk-execute-merge:
    post:
      operationId: bulkExecuteMerge
      tags: [customers]
      summary: Execute the full merge cascade for an array of duplicate clusters
      description: >
        For each cluster, performs the ACID transaction cascade that re-points
        all child records to the primary ID and permanently deletes secondaries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkExecuteMergeBody"
      responses:
        "200":
          description: Per-cluster results summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMergeResult"

  # ── Storage ───────────────────────────────────────────────────────────────

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ── Transactions ──────────────────────────────────────────────────────────
  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
